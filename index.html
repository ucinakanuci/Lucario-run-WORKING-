<!DOCTYPE html>
<html>

    <title>Lucario Project</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        
        /* The Hitbox (Step 3, Number 4) */
        .hitbox {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid red; /* Shows the hitbox area */
            left: 100px;
            top: 200px;
        }

        /* The Character Sprite (Importing Lucario) */
        .lucario-sprite {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hitbox" id="lucario-box">
        <!-- We will "import" the GIF here next -->
        <img id="lucario-gif" class="lucario-sprite" src="" alt="Lucario">
    </div>
</div>
