<!DOCTYPE html>
<html>
<head>
    <title>Lucario vs Greninja</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #333; border-bottom: 5px solid #555; }
        
        /* Lucario (The Player) */
        .player {
            position: absolute;
            width: 80px;
            height: 80px;
            left: 50px;
            bottom: 0px; /* Starts on the ground */
            border: 2px solid red; /* The Hitbox */
        }

        /* Greninja (The Obstacle) */
        .enemy {
            position: absolute;
            width: 80px;
            height: 80px;
            right: -100px;
            bottom: 0px;
            border: 2px solid blue;
        }

        img { width: 100%; height: 100%; image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lucario-box" class="player">
        <img src="https://githubusercontent.com" alt="Lucario">
    </div>
</div>

<script>
    const lucario = document.getElementById('lucario-box');
    const container = document.getElementById('game-container');
    
    let isJumping = false;
    let gravity = 0.9;
    let position = 0;

    // --- 1. JUMP LOGIC ---
    function jump() {
        if (isJumping) return;
        isJumping = true;
        let count = 0;
        
        let timerId = setInterval(function () {
            // Move Up
            if (count === 15) {
                clearInterval(timerId);
                let downTimerId = setInterval(function () {
                    // Move Down
                    if (count === 0) {
                        clearInterval(downTimerId);
                        isJumping = false;
                    }
                    position -= 5;
                    count--;
                    position = position * gravity;
                    lucario.style.bottom = position + 'px';
                }, 20);
            }
            position += 30;
            count++;
            position = position * gravity;
            lucario.style.bottom = position + 'px';
        }, 20);
    }

    // Spacebar Listener
    document.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
            jump();
        }
    });

    // --- 2. ENEMY LOGIC (Spawn Greninjas) ---
    function spawnGreninja() {
        let enemyPos = 0; // Starts at the right
        const enemy = document.createElement('div');
        enemy.classList.add('enemy');
        enemy.innerHTML = `<img src="https://githubusercontent.com">`;
        container.appendChild(enemy);

        let moveTimer = setInterval(() => {
            enemyPos += 10;
            enemy.style.right = enemyPos + 'px';

            // Delete enemy if it leaves screen
            if (enemyPos > window.innerWidth) {
                clearInterval(moveTimer);
                container.removeChild(enemy);
            }

            // Simple Collision Detection
            let lucarioRect = lucario.getBoundingClientRect();
            let enemyRect = enemy.getBoundingClientRect();

            if (lucarioRect.right > enemyRect.left && 
                lucarioRect.left < enemyRect.right && 
                lucarioRect.bottom > enemyRect.top) {
                console.log("HIT!");
                // You can add "Game Over" logic here!
            }
        }, 20);

        // Randomly spawn next one
        setTimeout(spawnGreninja, Math.random() * 3000 + 1000);
    }

    spawnGreninja();
</script>

</body>
</html>
