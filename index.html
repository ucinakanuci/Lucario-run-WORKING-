<!DOCTYPE html>
<html>
<head>
    <title>Lucario vs Greninja - Your Custom Links</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #333; border-bottom: 5px solid #555; }
        
        .player {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 50px;
            bottom: 0px;
            border: 2px solid red; /* Lucario Hitbox */
        }

        .enemy {
            position: absolute;
            width: 100px;
            height: 100px;
            right: -100px;
            bottom: 0px;
            border: 2px solid blue; /* Greninja Hitbox */
        }

        img { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lucario-box" class="player">
        <!-- Using your Lucario link -->
        <img src="https://imgbin.com" alt="Lucario">
    </div>
</div>

<script>
    const lucario = document.getElementById('lucario-box');
    const container = document.getElementById('game-container');
    let isJumping = false;
    let position = 0;

    function jump() {
        if (isJumping) return;
        isJumping = true;
        let upTimer = setInterval(() => {
            if (position >= 150) {
                clearInterval(upTimer);
                let downTimer = setInterval(() => {
                    if (position <= 0) {
                        clearInterval(downTimer);
                        isJumping = false;
                    }
                    position -= 8;
                    lucario.style.bottom = position + 'px';
                }, 20);
            }
            position += 20;
            lucario.style.bottom = position + 'px';
        }, 20);
    }

    document.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });

    function spawnGreninja() {
        const enemy = document.createElement('div');
        enemy.classList.add('enemy');
        // Using your Greninja link
        enemy.innerHTML = `<img src="https://cleanpng.com">`;
        container.appendChild(enemy);

        let enemyPos = -100;
        let moveTimer = setInterval(() => {
            enemyPos += 8;
            enemy.style.right = enemyPos + 'px';
            if (enemyPos > window.innerWidth) {
                clearInterval(moveTimer);
                container.removeChild(enemy);
            }
        }, 20);
        setTimeout(spawnGreninja, Math.random() * 2000 + 1500);
    }
    spawnGreninja();
</script>
</body>
</html>
