<!DOCTYPE html>
<html>
<head>
    <title>Lucario Project</title>
    <style>
        /* General page setup */
        body { margin: 0; background: #222; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        
        /* The Hitbox (Step 3, Number 4) */
        .hitbox {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid red; /* The red box we discussed */
            left: 100px;
            top: 200px;
        }

        /* The Character Sprite (Imported Lucario) */
        .lucario-sprite {
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* Keeps the pixel art sharp */
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hitbox" id="lucario-box">
        <!-- FULL LINK ADDED HERE: This makes Lucario appear -->
        <img id="lucario-gif" 
             class="lucario-sprite" 
             src="https://githubusercontent.com" 
             alt="Lucario">
    </div>
</div>
